<!DOCTYPE html>
<html>

<head>
    <title>Patient Records</title>
</head>

<body>

<h1>Patient Management</h1>

<h2>Add Patient</h2>

<form method="POST">

<label>Patient Name:</label><br>
<input type="text" name="name" required><br><br>

<label>Age:</label><br>
<input type="number" name="age"><br><br>

<label>Diagnosis:</label><br>
<input type="text" name="diagnosis"><br><br>

<label>Treatment:</label><br>
<input type="text" name="treatment"><br><br>

<button type="submit">Add Patient</button>

</form>

<hr>

<h2>Patient Records</h2>

<table border="1">

<tr>
<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Diagnosis</th>
<th>Treatment</th>
<th>Action</th>
</tr>

{% for patient in patients %}

<tr>
<td>{{ patient[0] }}</td>
<td>{{ patient[1] }}</td>
<td>{{ patient[2] }}</td>
<td>{{ patient[3] }}</td>
<td>{{ patient[4] }}</td>

<td>
<a href="/edit_patient/{{ patient[0] }}" style="color: green;">Edit</a> |
<a href="/delete_patient/{{ patient[0] }}" style="color: red;">Delete</a>
</td>

</tr>

{% endfor %}

</table>

<br><br>

<a href="/dashboard">Back to Dashboard</a>

</body>

</html>
